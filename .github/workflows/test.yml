name: test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25.x']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Vet
        run: go vet ./...

      - name: Test (with coverage)
        run: go test -count=1 -timeout=120s -coverprofile=coverage.txt ./...

      - name: Test (race detector)
        run: go test -race -count=1 -timeout=240s ./...

      - name: Benchs sub-module (compile check)
        run: |
          cd benchs
          go test -count=0 ./...

      - name: Hashbench sub-module (compile check)
        run: |
          cd hashbench
          go test -count=0 ./...

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
